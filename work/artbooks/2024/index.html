<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Book 2024 — quidquerias</title>
<script src="page-flip.browser.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;1,400&family=Playfair+Display:wght@700&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #2a2520;
    --bg-inner:  #231f1b;
    --text:      #c8c8c8;
    --text-dim:  rgba(200,200,200,0.35);
    --accent:    #D84D06;
    --border:    rgba(200,200,200,0.08);
    --font-body: 'Courier Prime', monospace;
    --font-head: 'Playfair Display', serif;
    --font-ui:   'Josefin Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { overflow: hidden; height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 20px 32px 16px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #e8e8e8;
    text-transform: uppercase;
  }

  header span {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── Views ── */
  #nav-view, #book-view {
    position: relative;
    z-index: 1;
    width: 100%;
    flex: 1;
    display: flex;
    transition: opacity 0.4s ease;
  }

  #nav-view.hidden, #book-view.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
    top: 0; left: 0;
  }

  /* ── NAV VIEW ── */
  #nav-view {
    justify-content: center;
    align-items: stretch;
    padding: 40px 32px 48px;
    gap: 48px;
    max-width: 1000px;
    margin: 0 auto;
    flex-wrap: wrap;
  }

  /* Cover */
  #nav-cover {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  #nav-cover img {
    width: 240px;
    height: auto;
    display: block;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }

  /* Chapter list */
  #nav-chapters {
    flex: 0 1 420px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 4px;
  }

  #nav-chapters h2 {
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* Top-level item */
  .ch-item {
    display: flex;
    flex-direction: column;
  }

  .ch-top {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  /* Expand toggle — left of title, only on items with subs */
  .ch-toggle {
    width: 20px;
    flex-shrink: 0;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.7rem;
    transition: transform 0.2s, color 0.2s;
    text-align: center;
  }

  .ch-toggle:hover { color: var(--text); }
  .ch-item.open .ch-toggle { transform: rotate(90deg); color: var(--accent); }

  /* Spacer for items without a toggle, keeps title aligned */
  .ch-toggle-spacer { width: 20px; flex-shrink: 0; }

  /* Clickable title portion */
  .ch-title-link {
    flex: 1;
    display: flex;
    align-items: baseline;
    gap: 6px;
    cursor: pointer;
    transition: color 0.2s;
    min-width: 0;
  }

  .ch-title-link:hover .ch-title { color: var(--accent); }
  .ch-item.open .ch-title { color: var(--accent); }

  .ch-num {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    min-width: 24px;
    text-align: right;
    flex-shrink: 0;
    padding-right: 8px;
  }

  .ch-title {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .ch-pg-inline {
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ch-subs {
    display: none;
    flex-direction: column;
    padding-left: 44px;
    padding-bottom: 4px;
  }

  .ch-item.open .ch-subs { display: flex; }

  .ch-sub {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(200,200,200,0.04);
    cursor: pointer;
  }

  .ch-sub-title {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .ch-sub:hover .ch-sub-title { color: var(--accent); }

  /* ── BOOK VIEW ── */
  #book-view {
    justify-content: center;
    align-items: center;
    padding: 24px 0 0;
    flex-direction: column;
  }

  #stage {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #book-wrapper {
    position: relative;
    transform: perspective(2000px) rotateX(3deg);
    transform-origin: center bottom;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.55));
  }

  #flipbook { display: block; }

  .page-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── Page edge click zones ── */
  #zone-prev, #zone-next {
    position: absolute;
    top: 0;
    height: 100%;
    width: 48px;
    z-index: 20;
    cursor: pointer;
    transition: background 0.2s;
  }

  #zone-prev {
    left: 0;
    background: linear-gradient(to right, rgba(0,0,0,0.22), transparent);
  }

  #zone-next {
    right: 0;
    background: linear-gradient(to left, rgba(0,0,0,0.22), transparent);
  }

  #zone-prev:hover {
    background: linear-gradient(to right, rgba(216,77,6,0.18), transparent);
  }

  #zone-next:hover {
    background: linear-gradient(to left, rgba(216,77,6,0.18), transparent);
  }

  /* ── Header tap-back zone ── */
  #zone-header {
    position: absolute;
    top: 0;
    left: 48px;
    right: 48px;
    height: 8%;
    z-index: 21;
    cursor: pointer;
  }

  /* ── Footer hint ── */
  #book-footer {
    width: 100%;
    padding: 10px 32px 18px;
    display: flex;
    justify-content: center;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #hint {
    font-size: 0.52rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ── Loader ── */
  #loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 300;
    transition: opacity 0.5s ease;
  }

  #loader.hidden { opacity: 0; pointer-events: none; }

  #loader-title {
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 700;
    color: #e8e8e8;
    letter-spacing: 0.06em;
  }

  .loader-bar {
    width: 120px;
    height: 1px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .loader-bar::after {
    content: '';
    position: absolute;
    left: -40%;
    width: 40%;
    height: 100%;
    background: var(--accent);
    animation: slide 1.1s ease-in-out infinite;
  }

  @keyframes slide { 0% { left: -40%; } 100% { left: 100%; } }

  #loader-sub {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    #nav-view { padding: 24px 16px 32px; gap: 28px; }
    #nav-cover img { width: 160px; }
    header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<div id="loader">
  <div id="loader-title">Art Book 2024</div>
  <div class="loader-bar"></div>
  <div id="loader-sub">quidquerias</div>
</div>

<header>
  <h1>Art Book 2024</h1>
  <span>quidquerias</span>
</header>

<!-- ── NAV VIEW ── -->
<div id="nav-view" class="hidden">

  <div id="nav-cover">
    <img src="spreads/spread-000.webp" alt="Art Book 2024 Cover" id="cover-img">
  </div>

  <div id="nav-chapters">
    <h2>Contents</h2>
    <!-- Populated by JS -->
  </div>

</div>

<!-- ── BOOK VIEW ── -->
<div id="book-view" class="hidden">

  <div id="stage">
    <div id="book-wrapper">
      <div id="flipbook"></div>
      <!-- Edge click zones, repositioned by JS after flipbook renders -->
      <div id="zone-prev"   title="Previous page"></div>
      <div id="zone-next"   title="Next page"></div>
      <div id="zone-header" title="Back to contents"></div>
    </div>
  </div>

  <div id="book-footer">
    <div id="hint">← → turn &nbsp;·&nbsp; shift + ← → skim &nbsp;·&nbsp; tap top of page for contents</div>
  </div>

</div>

<script>
// ── Chapter data ─────────────────────────────────────────
// page: values are file indices (spread-NNN) directly
const CHAPTERS = [
  { title: 'Preface',             page: 1   },
  { title: 'Introduction',        page: 7   },
  { title: 'Video Projects',      page: 10,  subs: [
    { title: 'Nasuni Anthem',                page: 14 },
    { title: 'Consigli Construction',        page: 16 },
    { title: 'Babson College',               page: 19 },
    { title: 'University of New Hampshire',  page: 21 },
    { title: 'MIT Tough Tech Week',          page: 23 },
  ]},
  { title: 'Archive Development', page: 25,  subs: [
    { title: 'Who Needs an Archive', page: 26 },
    { title: 'Why Obsidian',         page: 31 },
  ]},
  { title: 'Worldbuilding & King Tide Progress', page: 38, subs: [
    { title: 'The Mix',                       page: 43  },
    { title: 'Better Magic. Better Stories.', page: 48  },
    { title: 'Preparing Ingredients',         page: 52  },
    { title: 'Eggs',                          page: 60  },
    { title: 'Flour',                         page: 66  },
    { title: 'Map Evolution',                 page: 68  },
    { title: 'Flowcharts & Timelines',        page: 78  },
    { title: 'Additional Programs',           page: 83  },
    { title: 'Sugar',                         page: 86  },
  ]},
  { title: 'Collaborative Writing', page: 124 },
  { title: 'Heckfest 2024',         page: 144, subs: [
    { title: 'Remembrance',         page: 148 },
    { title: 'Afterlife',           page: 149 },
    { title: 'Gorgon',              page: 152 },
    { title: 'Coterie',             page: 157 },
    { title: 'Familiars',           page: 162 },
    { title: 'Scry',                page: 164 },
    { title: 'Halloween Nostalgia', page: 172 },
  ]},
  { title: 'Poems',             page: 178 },
  { title: 'Physical Projects', page: 222, subs: [
    { title: 'Plants & Gardening', page: 224 },
    { title: 'Hand-Crafted',       page: 244 },
    { title: 'Real Life',          page: 290 },
  ]},
  { title: 'A Look Back & A Look Ahead', page: 314 },
];

// ── Config ───────────────────────────────────────────────
const CONFIG = {
  totalFiles:   318,
  pageOffset:   7,       // file index 7 = printed page 1
  printedTotal: 311,
  imageDir:     'https://github.com/QuidQuerias/quidquerias/releases/download/artbook-2024-v1',
  pageWidth:    825,
  pageHeight:   1275,
};

const SKIM_COUNT = 3;
const BUFFER     = 10;

// ── Helpers ──────────────────────────────────────────────
function imgPath(i) {
  return `${CONFIG.imageDir}/spread-${String(i).padStart(3,'0')}.webp`;
}

// page values in CHAPTERS are already file indices — no conversion needed

function getUrlIndex() {
  const p = new URLSearchParams(window.location.search).get('page');
  const n = parseInt(p, 10);
  return isNaN(n) ? null : Math.max(0, Math.min(n, CONFIG.totalFiles - 1));
}

function setUrlIndex(i) {
  const url = new URL(window.location);
  url.searchParams.set('page', i);
  window.history.replaceState(null, '', url);
}

function clearUrlPage() {
  const url = new URL(window.location);
  url.searchParams.delete('page');
  window.history.replaceState(null, '', url);
}

// ── View switching ────────────────────────────────────────
const navView  = document.getElementById('nav-view');
const bookView = document.getElementById('book-view');
let bookInitialized = false;

function showNav() {
  bookView.classList.add('hidden');
  navView.classList.remove('hidden');
  clearUrlPage();
}

function showBook(fileIndex) {
  navView.classList.add('hidden');
  bookView.classList.remove('hidden');

  // Always pre-hydrate images around the target before jumping
  hydrateAround(fileIndex ?? 0);

  if (!bookInitialized) {
    initFlipbook(fileIndex);
    bookInitialized = true;
  } else if (fileIndex !== undefined) {
    // Small delay to let images load before the flip animation starts
    setTimeout(() => pageFlip.flip(fileIndex, 'top'), 80);
  }
  setUrlIndex(fileIndex ?? 0);
}

// ── Build chapter nav ─────────────────────────────────────
function fileIdxToPrinted(fileIdx) {
  const p = fileIdx - CONFIG.pageOffset + 1;
  return (p >= 1 && p <= CONFIG.printedTotal) ? p : null;
}

function buildNav() {
  const container = document.getElementById('nav-chapters');
  CHAPTERS.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'ch-item';

    const top = document.createElement('div');
    top.className = 'ch-top';

    // Toggle arrow (subs) or spacer (no subs)
    if (ch.subs) {
      const toggle = document.createElement('span');
      toggle.className = 'ch-toggle';
      toggle.textContent = '›';
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        item.classList.toggle('open');
      });
      top.appendChild(toggle);
    } else {
      const spacer = document.createElement('span');
      spacer.className = 'ch-toggle-spacer';
      top.appendChild(spacer);
    }

    // Number
    const num = document.createElement('span');
    num.className = 'ch-num';
    num.textContent = String(i + 1).padStart(2, '0');

    // Title link with inline page number
    const titleLink = document.createElement('span');
    titleLink.className = 'ch-title-link';
    titleLink.addEventListener('click', () => showBook(ch.page));

    const title = document.createElement('span');
    title.className = 'ch-title';
    title.textContent = ch.title;

    const printed = fileIdxToPrinted(ch.page);
    const pg = document.createElement('span');
    pg.className = 'ch-pg-inline';
    pg.textContent = printed ? `(p. ${printed})` : '';

    titleLink.appendChild(title);
    titleLink.appendChild(pg);

    top.appendChild(num);
    top.appendChild(titleLink);
    item.appendChild(top);

    if (ch.subs) {
      const subs = document.createElement('div');
      subs.className = 'ch-subs';

      ch.subs.forEach(sub => {
        const s = document.createElement('div');
        s.className = 'ch-sub';

        const st = document.createElement('span');
        st.className = 'ch-sub-title';
        st.textContent = sub.title;

        const subPrinted = fileIdxToPrinted(sub.page);
        const spg = document.createElement('span');
        spg.className = 'ch-pg-inline';
        spg.textContent = subPrinted ? `(p. ${subPrinted})` : '';

        s.appendChild(st);
        s.appendChild(spg);
        s.addEventListener('click', () => showBook(sub.page));
        subs.appendChild(s);
      });

      item.appendChild(subs);
    }

    container.appendChild(item);
  });
}

// ── Build flipbook pages ──────────────────────────────────
function buildPages() {
  const container = document.getElementById('flipbook');
  for (let i = 0; i < CONFIG.totalFiles; i++) {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.idx = i;
    const img = document.createElement('img');
    img.className = 'page-img';
    img.alt = '';
    if (i < 10) {
      img.src = imgPath(i);
    } else {
      img.dataset.src = imgPath(i);
    }
    div.appendChild(img);
    container.appendChild(div);
  }
}

function hydrateAround(idx) {
  const lo = Math.max(0, idx - BUFFER);
  const hi = Math.min(CONFIG.totalFiles - 1, idx + BUFFER);
  for (let i = lo; i <= hi; i++) {
    const el = document.querySelector(`.page[data-idx="${i}"] img`);
    if (el && el.dataset.src && !el.getAttribute('src')) {
      el.src = el.dataset.src;
    }
  }
}

// ── Init flipbook ─────────────────────────────────────────
let pageFlip;
let skimming = false;

function calcDims() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const availH = vh - 120;
  const availW = vw - 32;
  const aspect = (CONFIG.pageWidth * 2) / CONFIG.pageHeight;
  let h = availH;
  let w = h * aspect;
  if (w > availW) { w = availW; h = w / aspect; }
  const single = vw < 600;
  return {
    w: single ? Math.round(w / 2) : Math.round(w),
    h: Math.round(h),
    single,
  };
}

function initFlipbook(startFileIndex) {
  const dims = calcDims();

  pageFlip = new St.PageFlip(
    document.getElementById('flipbook'),
    {
      width:               dims.single ? dims.w : Math.round(dims.w / 2),
      height:              dims.h,
      size:                'fixed',
      usePortrait:         dims.single,
      startPage:           startFileIndex ?? 0,
      drawShadow:          true,
      flippingTime:        700,
      useMouseEvents:      true,
      swipeDistance:       30,
      showCover:           true,
      mobileScrollSupport: false,
      autoSize:            false,
    }
  );

  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  pageFlip.on('flip', e => {
    setUrlIndex(e.data);
    hydrateAround(e.data);
  });

  hydrateAround(startFileIndex ?? 0);
}

// ── Skim flip ─────────────────────────────────────────────
// Fires SKIM_COUNT flips sequentially, each after the previous finishes.
// Uses a timeout slightly longer than SKIM_SPEED to ensure clean sequencing.
const SKIM_SPEED  = 380;  // ms per flip during skim
const SKIM_GAP    = 420;  // ms between firing each (> SKIM_SPEED)
const NORMAL_SPEED = 700;

function skim(direction) {
  if (skimming || !pageFlip) return;
  skimming = true;
  pageFlip.setting.flippingTime = SKIM_SPEED;

  let count = 0;

  function fireNext() {
    if (count >= SKIM_COUNT) {
      pageFlip.setting.flippingTime = NORMAL_SPEED;
      skimming = false;
      return;
    }
    count++;
    if (direction > 0) pageFlip.flipNext('top');
    else               pageFlip.flipPrev('top');
    setTimeout(fireNext, SKIM_GAP);
  }

  fireNext();
}

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!bookInitialized) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); e.shiftKey ? skim(1)  : pageFlip.flipNext('top'); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); e.shiftKey ? skim(-1) : pageFlip.flipPrev('top'); }
});

// ── Zone listeners (added after flipbook renders) ─────────
function bindZones() {
  document.getElementById('zone-prev').addEventListener('click', e => {
    e.shiftKey ? skim(-1) : pageFlip.flipPrev('top');
  });
  document.getElementById('zone-next').addEventListener('click', e => {
    e.shiftKey ? skim(1) : pageFlip.flipNext('top');
  });
  document.getElementById('zone-header').addEventListener('click', () => {
    showNav();
  });
}

// ── Initial load ──────────────────────────────────────────
buildPages();
buildNav();

const urlIdx = getUrlIndex();

// Cover image load drives loader dismiss
const coverImg = document.getElementById('cover-img');

function onReady() {
  document.getElementById('loader').classList.add('hidden');
  if (urlIdx !== null) {
    showBook(urlIdx);
  } else {
    showNav();
  }
  bindZones();
}

if (coverImg.complete && coverImg.naturalWidth > 0) {
  onReady();
} else {
  coverImg.addEventListener('load',  onReady);
  coverImg.addEventListener('error', onReady);
}
</script>
</body>
</html>
