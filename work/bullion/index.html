<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trouble in Bullion — Interactive Map</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1208;
      --parchment:  #f2e8d5;
      --aged:       #d4c4a0;
      --rust:       #8b3a1a;
      --gold:       #c8972a;
      --gold-light: #e8c060;
      --shadow:     rgba(26, 18, 8, 0.55);
      --panel-bg:   rgba(18, 12, 4, 0.82);
      --panel-w:    30vw;
      --panel-max:  500px;
      --panel-h:    82vh;
      --panel-min:  200px;
      --ctrl-w:     36px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Crimson Pro', Georgia, serif;
      color: var(--parchment);
    }

    /* ─── MAP ──────────────────────────────────────────── */
    #map { position: fixed; inset: 0; z-index: 1; cursor: crosshair; }
    .leaflet-control-attribution {
      background: rgba(18,12,4,0.7) !important; color: var(--aged) !important;
      font-family: 'Crimson Pro', serif; font-size: 10px;
    }

    /* ─── ZOOM CONTROL ─────────────────────────────────── */
    .leaflet-control-zoom {
      border: 1px solid var(--gold) !important; border-radius: 2px 2px 0 0 !important;
      overflow: hidden !important; box-shadow: none !important; margin: 0 !important;
    }
    .leaflet-control-zoom a {
      background: var(--panel-bg) !important; color: var(--gold) !important;
      font-family: 'Cinzel', serif !important; font-size: 20px !important;
      width: var(--ctrl-w) !important; height: var(--ctrl-w) !important;
      line-height: var(--ctrl-w) !important;
      border-bottom: 1px solid rgba(200,151,42,0.3) !important;
      display: flex !important; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .leaflet-control-zoom a:hover { background: var(--rust) !important; color: var(--gold-light) !important; }
    .zoom-badge {
      width: var(--ctrl-w);
      text-align: center; padding: 4px 0;
      background: var(--panel-bg);
      border: 1px solid var(--gold); border-top: none;
      border-radius: 0 0 2px 2px;
      box-shadow: 0 2px 10px var(--shadow);
      font-family: 'Cinzel', serif; font-size: 11px;
      letter-spacing: 0.08em; color: var(--gold-light);
      margin-top: -6px;
    }
    .leaflet-top.leaflet-left { display: none; }
    .leaflet-top.leaflet-right {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; top: 14px !important; right: 14px !important;
    }
    .leaflet-top.leaflet-right .leaflet-control { margin: 0 !important; float: none !important; }

    /* ─── CUSTOM CONTROL BUTTONS ───────────────────────── */
    .map-ctrl-btn {
      width: var(--ctrl-w); height: var(--ctrl-w);
      display: flex; align-items: center; justify-content: center;
      background: var(--panel-bg);
      border: 1px solid rgba(200,151,42,0.45);
      border-radius: 2px;
      box-shadow: 0 2px 10px var(--shadow);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .map-ctrl-btn:hover { background: var(--rust); border-color: var(--gold); }
    .map-ctrl-btn.active { background: rgba(200,151,42,0.18); border-color: var(--gold); }

    /* ─── HOVER ZONE NAME ──────────────────────────────── */
    #zone-name {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      z-index: 10; pointer-events: none;
      font-family: 'Cinzel', serif; font-weight: 600;
      font-size: clamp(14px, 1.8vw, 22px);
      color: var(--gold); letter-spacing: 0.08em;
      white-space: nowrap; opacity: 0; transition: opacity 0.2s;
      background: rgba(14,9,3,0.82); border: 1px solid rgba(200,151,42,0.35);
      padding: 8px 24px 7px;
    }
    #zone-name.visible { opacity: 1; }

    /* ─── ZONE POLYGONS ────────────────────────────────── */
    .zone-polygon {
      fill: transparent; stroke: var(--gold); stroke-width: 28;
      stroke-opacity: 0; fill-opacity: 0; cursor: pointer;
      transition: stroke-opacity 0.25s, fill-opacity 0.25s;
    }
    .zone-polygon.hover  { stroke-opacity: 0.55; fill-opacity: 0.10; fill: var(--gold); }
    .zone-polygon.active { stroke-opacity: 0.72; fill-opacity: 0.14; fill: var(--gold); }
    .zone-polygon.layer-region {
      stroke-width: 0; fill: var(--gold-light); fill-opacity: 0;
      visibility: hidden; pointer-events: none;
    }
    .zoom-far .zone-polygon.layer-region { visibility: visible; pointer-events: auto; }
    .zone-polygon.layer-region.hover  { fill-opacity: 0.18; }
    .zone-polygon.layer-region.active { fill-opacity: 0.26; }
    .zone-polygon.always-visible      { visibility: visible !important; }
    .zoom-far .zone-polygon.layer-zone { pointer-events: none; }
    .zoom-far .zone-polygon.layer-zone.always-visible { pointer-events: auto !important; }
    .zoom-far .zone-polygon.layer-extra { pointer-events: none; }

    /* ─── INFO PANEL ───────────────────────────────────── */
    #info-panel {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%) translateX(-100%);
      width: var(--panel-w);
      max-width: var(--panel-max);
      height: auto;
      max-height: var(--panel-h);
      min-height: var(--panel-min);
      z-index: 20;
      opacity: 1;
      /* Only transition transform — opacity is controlled inline */
      transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }
    #info-panel.open {
      transform: translateY(-50%) translateX(0);
      pointer-events: all;
    }

    /* Panel main area — auto height, close affordance is the right edge itself */
    #panel-inner {
      width: 100%;
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(200,151,42,0.25);
      border-top: 1px solid rgba(200,151,42,0.25);
      border-bottom: 1px solid rgba(200,151,42,0.25);
      border-left: 3px solid var(--gold);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Full-height right-edge close strip — no box, no protrusion, flush with panel */
    #panel-fold {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: background 0.2s, opacity 0.2s;
      background: transparent;
      border: none;
      padding: 0;
    }
    #info-panel.open #panel-fold { opacity: 1; pointer-events: all; }
    #panel-fold:hover { background: rgba(139,58,26,0.18); }
    /* Thin visible line on the very right edge */
    #panel-fold::before {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 1px;
      background: rgba(200,151,42,0.22);
      transition: background 0.2s;
    }
    #panel-fold:hover::before { background: rgba(200,151,42,0.5); }

    /* Open tab — same treatment: full-height strip on viewport left edge */
    #panel-open-tab {
      position: fixed;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 64px;
      background: var(--panel-bg);
      border: 1px solid rgba(200,151,42,0.3);
      border-left: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 19;
      transition: background 0.2s, opacity 0.2s;
    }
    #info-panel.open ~ #panel-open-tab { opacity: 0; pointer-events: none; }
    #panel-open-tab:hover { background: rgba(139,58,26,0.5); border-color: var(--gold); }

    .tab-arrow { opacity: 0.55; transition: opacity 0.2s; }
    #panel-fold:hover .tab-arrow,
    #panel-open-tab:hover .tab-arrow { opacity: 1; }

    /* ─── PANEL HEADER ─────────────────────────────────── */
    #panel-header {
      flex-shrink: 0;
      padding: 18px 28px 12px 18px;
      border-bottom: 1px solid rgba(200,151,42,0.15);
    }
    #panel-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    #panel-name {
      font-family: 'Cinzel', serif; font-weight: 600;
      font-size: clamp(18px, 2.2vw, 28px); color: var(--parchment);
      letter-spacing: 0.08em; line-height: 1.15;
      flex: 1; min-width: 0;
    }
    /* View buttons — right-aligned in header */
    #panel-icons {
      display: flex; gap: 6px; align-items: center;
      flex-shrink: 0;
    }
    .view-btn {
      position: relative; width: 36px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid rgba(200,151,42,0.3);
      cursor: pointer; border-radius: 2px;
      transition: border-color 0.2s, background 0.2s;
    }
    .view-btn svg { flex-shrink: 0; opacity: 0.7; transition: opacity 0.2s; }
    .view-btn:hover { border-color: var(--gold); background: rgba(200,151,42,0.08); }
    .view-btn:hover svg { opacity: 1; }
    .view-btn.active { border-color: var(--gold); background: rgba(200,151,42,0.12); }
    .view-btn.active svg { opacity: 1; }
    .view-btn .btn-tip {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: rgba(14,9,3,0.92); border: 1px solid rgba(200,151,42,0.3);
      color: var(--aged); font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 11px; padding: 3px 8px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.15s; z-index: 30;
    }
    .view-btn:hover .btn-tip { opacity: 1; }

    #panel-logline {
      font-family: 'Crimson Pro', serif; font-style: italic; font-weight: 300;
      font-size: clamp(14px, 1.35vw, 17px); color: var(--gold-light);
      letter-spacing: 0.04em; opacity: 0.85;
    }

    /* ─── PANEL BODY (scrollable) ──────────────────────── */
    #panel-body {
      flex: 1;
      min-height: 80px;
      max-height: calc(var(--panel-h) - 180px); /* cap so portraits/header always fit */
      padding: 14px 28px 12px 20px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--rust) transparent;
    }
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--rust); border-radius: 2px; }
    #panel-description {
      font-family: 'Crimson Pro', serif; font-weight: 300;
      font-size: clamp(14px, 1.35vw, 17px); line-height: 1.72; color: var(--aged);
    }
    #panel-description a { color: var(--gold-light); }
    #panel-description .zone-link { color: var(--gold-light); cursor: pointer; text-decoration: underline; }

    /* ─── PORTRAITS ────────────────────────────────────── */
    #panel-portraits-wrap {
      flex-shrink: 0;
      padding: 10px 28px 16px 14px;
      border-top: 1px solid rgba(200,151,42,0.12);
      display: none;
      align-items: center;
      gap: 8px;
      overflow: visible;
    }
    #panel-portraits-wrap.has-portraits { display: flex; }

    .portrait-nav {
      flex-shrink: 0;
      width: 22px; height: 78px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid rgba(200,151,42,0.25);
      border-radius: 2px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      opacity: 0.65;
    }
    .portrait-nav:hover { border-color: var(--gold); background: rgba(200,151,42,0.08); opacity: 1; }
    .portrait-nav.hidden { visibility: hidden; pointer-events: none; }

    #portrait-track-wrap {
      flex: 1; min-width: 0;
      overflow-x: hidden;
      overflow-y: visible;
    }
    #portrait-track {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .portrait-wrap { position: relative; flex-shrink: 0; }
    .portrait-wrap img {
      width: 78px; height: 78px; object-fit: cover;
      border: 1px solid rgba(200,151,42,0.3); display: block;
      filter: sepia(0.15) contrast(1.05); transition: border-color 0.2s, filter 0.2s;
    }
    .portrait-wrap:hover img { border-color: var(--gold); filter: sepia(0) contrast(1.1); }

    /* Single shared portrait tooltip — fixed so it escapes all overflow contexts */
    #portrait-tooltip {
      position: fixed;
      background: rgba(14,9,3,0.92); border: 1px solid rgba(200,151,42,0.4);
      color: var(--parchment); font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 12px; padding: 4px 10px; white-space: nowrap;
      pointer-events: none; z-index: 100;
      opacity: 0; transition: opacity 0.15s;
    }
    #portrait-tooltip.visible { opacity: 1; }

    .leaflet-image-layer { transition: opacity 0.35s ease; }

    /* ─── CREDITS ──────────────────────────────────────── */
    #credits-panel {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(14,9,3,0.65); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #credits-panel.open { opacity: 1; pointer-events: all; }
    #credits-inner {
      background: var(--panel-bg); border: 1px solid rgba(200,151,42,0.35);
      padding: 28px 36px 24px; max-width: 500px; width: 90%; position: relative;
    }
    #credits-inner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    }
    #credits-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: var(--aged);
      font-size: 20px; cursor: pointer; line-height: 1; transition: color 0.2s;
    }
    #credits-close:hover { color: var(--gold); }
    #credits-headline {
      font-family: 'Crimson Pro', serif; font-weight: 300; font-style: italic;
      font-size: clamp(24px, 3vw, 38px);
      color: var(--parchment); line-height: 1.1; margin-bottom: 16px;
    }
    #credits-section-label {
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(200,151,42,0.15);
    }
    .credits-item {
      display: flex; gap: 14px; align-items: baseline; margin-bottom: 8px;
      font-family: 'Crimson Pro', serif; font-size: 14px;
      color: var(--aged); line-height: 1.4;
    }
    .credits-item .role {
      font-style: italic; color: var(--gold-light); white-space: nowrap;
      min-width: 120px; font-size: 13px; opacity: 0.85;
    }
    .credits-item a { color: var(--parchment); transition: color 0.2s; }
    .credits-item a:hover { color: var(--gold-light); }

    /* ═══════════════════════════════════════════════════
       INTRO / LANDING
       z-index 100 — sits above map, panel, everything.
       Removed from DOM entirely on entry.
    ═══════════════════════════════════════════════════ */
    #landing {
      position: fixed; inset: 0; z-index: 100;
      background: #111; overflow: hidden;
      cursor: pointer; /* whole surface is clickable */
    }
    #landing-viewport {
      position: absolute; left: 0; width: 100vw;
      height: 56.25vw; top: 50%; transform: translateY(-50%);
      overflow: hidden;
    }
    #landing-scene {
      position: absolute; top: 0; left: 0; width: 100%;
      filter: brightness(0.65) blur(0.75px);
      will-change: transform;
    }
    #landing-world { position: relative; width: 100vw; height: auto; display: block; }
    #landing-world #people > *, #landing-world #boat > *, #landing-world #carts > * { display: none; }

    #landing-vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 20%, rgba(0,0,0,0.85) 100%);
      z-index: 110;
    }
    #landing-grain {
      position: absolute; inset: 0; pointer-events: none; z-index: 106;
      opacity: 0.58;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px 256px;
      mix-blend-mode: soft-light;
    }
    #landing-tiltshift {
      position: absolute; inset: 0; pointer-events: none;
      backdrop-filter: blur(3.5px); -webkit-backdrop-filter: blur(3.5px);
      -webkit-mask-image: linear-gradient(to bottom, black 0%, black 25%, transparent 35%, transparent 65%, black 75%, black 100%);
      mask-image: linear-gradient(to bottom, black 0%, black 25%, transparent 35%, transparent 65%, black 75%, black 100%);
      z-index: 105;
    }
    #landing-fade-cover {
      position: fixed; inset: 0; background: #000; z-index: 115;
      transition: opacity 4.5s ease-out;
    }
    #landing-title-overlay {
      position: fixed; inset: 0; z-index: 120;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; pointer-events: none; gap: 0.5vw;
    }
    #landing-title-top { display: flex; align-items: baseline; gap: 1.2vw; }
    #landing-trouble-svg {
      height: 4.5vw; width: auto; fill: #d6c9a8;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8));
      opacity: 0; animation: landingWordFadeIn 3s ease-out 1.2s forwards;
    }
    #landing-in-svg {
      height: 4.2vw; width: auto; fill: #d6c9a8;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8));
      opacity: 0; animation: landingWordFadeIn 3s ease-out 2.2s forwards;
    }
    @keyframes landingWordFadeIn { from { opacity: 0; } to { opacity: 1; } }
    #landing-bullion-wrap { line-height: 0; }
    #landing-bullion-svg {
      height: 11.7vw; width: auto; fill: #c8972a; opacity: 0;
      filter: drop-shadow(0 0 18px rgba(200,151,42,0.35)) drop-shadow(0 4px 16px rgba(0,0,0,0.9));
      /* Two animations: fade in once, then oscillate scale indefinitely */
      animation:
        landingBullionFadeIn 6s ease-in-out 2.5s forwards,
        landingBullionBreath 10s ease-in-out 8.5s infinite alternate;
    }
    @keyframes landingBullionFadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 0.9; transform: scale(1); }
    }
    @keyframes landingBullionBreath {
      from { transform: scale(1); }
      to   { transform: scale(0.97); }
    }
    #landing-subtitle {
      font-family: 'Crimson Text', Georgia, serif; font-size: 1.8vw;
      font-style: italic; letter-spacing: 0.12em;
      color: rgba(214,201,168,0.75); text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      opacity: 0; margin-top: 0.8vw;
      animation: landingWordFadeIn 2s ease-out 7s forwards;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     INTRO / LANDING  — removed from DOM on entry
═══════════════════════════════════════════════════ -->
<div id="landing">
  <div id="landing-viewport">
    <div id="landing-scene">
      <svg id="world"
       xmlns="http://www.w3.org/2000/svg"
       xmlns:xlink="http://www.w3.org/1999/xlink"
       viewBox="0 15.23 1150 1150">

    <defs>

      <!-- Clip everything to the slate image bounds: 1150x1150 at y=15.23 -->
      <clipPath id="slateBounds">
        <rect x="0" y="15.23" width="1150" height="1150"/>
      </clipPath>

      <!-- Drop shadow applied to all sprites -->
      <filter id="spriteShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0.7" dy="0.7" stdDeviation="0.6"
                      flood-color="black" flood-opacity="0.5"/>
      </filter>

      <!-- Masks: white canvas = visible, black blocker shapes = hidden -->

      <mask id="upperMask">
        <rect x="0" y="0" width="1180.52" height="1188.49" fill="white"/>
        <path d="M312.43,817.66c.78.26-3.65,21.65-3.65,21.65l13.04,10.43,22.7-8.61v-19.57s-18-5.74-17.22-5.48-14.87,1.57-14.87,1.57Z" fill="black"/>
        <path d="M298.09,986.7l-16.7,7.83-2.35,17.74,16.96,10.17s21.13-4.7,21.91-4.43,2.35-24.78,2.35-24.78l-22.17-6.52Z" fill="black"/>
      </mask>

      <mask id="keepMask">
        <rect x="0" y="0" width="1180.52" height="1188.49" fill="white"/>
        <path d="M434.78,898.01s-9.57,2.53-10.35,3.84-6.78,15.39-6.78,15.39l7.22,14.68s18.78,6.78,20.09,6.26,12.52-12.52,12.52-12.52v-18.78l-22.7-8.87Z" fill="black"/>
        <path d="M370.17,770.95c.52.78,1.3,15.91,1.3,15.91,0,0,4.96,5.74,5.74,6s15,9.78,15,9.78l17.48-4.17,1.61-19.42-1.3-13.04-10.17-6.78-12.78,3.39-16.87,8.34Z" fill="black"/>
      </mask>

      <mask id="gateMask">

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const R2_BASE  = 'https://pub-c58d34cf00c64454a7a4841d1570b1c0.r2.dev';
const TILE_URL = `${R2_BASE}/tiles/{z}/{x}/{y}.jpg`;
const INT_URL  = (id) => `${R2_BASE}/interiors/${id}.webp`;
const CHAR_URL = (name) => `${R2_BASE}/characters/${encodeURIComponent(name)}.webp`;

const SVG_SIZE     = 11500;
const MAP_SIZE     = 256;
const SVG_Y_OFFSET = 73.26;

function px(x, y) {
  return L.latLng(-(y / SVG_SIZE) * MAP_SIZE, (x / SVG_SIZE) * MAP_SIZE);
}

const GRID_SPACING_SVG = 58;
const GRID_COLOR       = 'rgba(200,151,42,0.38)';
const GRID_WIDTH_SVG   = 8;

const BOUNDS = L.latLngBounds(L.latLng(0,0), L.latLng(-256,256));

const ICONS = {
  exterior: `<svg width="17" height="17" viewBox="0 0 14 14" fill="none">
    <path d="M7 1.5L1.5 6v6.5h4V9.5h3v3h4V6L7 1.5Z" stroke="#c8972a" stroke-width="1.1" stroke-linejoin="round"/>
  </svg>`,
  interior: `<svg width="15" height="18" viewBox="0 0 13 15" fill="none">
    <rect x="0.5" y="0.5" width="12" height="14" rx="0.5" stroke="#c8972a" stroke-width="1.1"/>
    <polygon points="3,1 11,2.5 11,12.5 3,14" stroke="#c8972a" stroke-width="1" fill="rgba(200,151,42,0.08)"/>
    <circle cx="9" cy="8" r="0.65" fill="#c8972a"/>
  </svg>`,
  upstairs: `<svg width="17" height="17" viewBox="0 0 14 14" fill="none">
    <polyline points="1.5,13.5 1.5,10.5 5,10.5 5,7.5 8.5,7.5 8.5,4.5 12,4.5 12,1.5 13.5,1.5 13.5,13.5 1.5,13.5"
      stroke="#c8972a" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter"/>
  </svg>`
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let LOCATIONS = [], locationMap = {};
let activeId = null, activeInterior = null, interiorLayer = null;
let gridLayer = null, gridVisible = false, svgEl = null;
let portraitPage = 0;
const PORTRAITS_PER_PAGE = 4;
let portraitData = [];

// ─── MAP INIT ────────────────────────────────────────────────────────────────
const map = L.map('map', {
  crs: L.CRS.Simple, minZoom: 2, maxZoom: 5,
  zoomControl: false, attributionControl: true,
  maxBounds: BOUNDS.pad(0.1), maxBoundsViscosity: 0.85
});

// Default entry: px(6200, 7000), zoom 3 — retained for intro stitching
map.setView(px(6200, 7000), 3);
L.tileLayer(TILE_URL, {
  tileSize: 256, minZoom: 2, maxZoom: 5,
  noWrap: true, bounds: BOUNDS, attribution: 'Bullion District'
}).addTo(map);

// Custom pane for zone SVG overlay — sits above imageOverlay (overlayPane z=400)
map.createPane('zonesPane');
map.getPane('zonesPane').style.zIndex = 450;
map.getPane('zonesPane').style.pointerEvents = 'none'; // pane itself non-blocking; SVG handles events

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function makeCtrl(html, title, onClick) {
  return L.Control.extend({
    options: { position: 'topright' },
    onAdd() {
      const btn = L.DomUtil.create('button', 'map-ctrl-btn');
      btn.title = title; btn.innerHTML = html;
      L.DomEvent.on(btn, 'click', L.DomEvent.stopPropagation);
      L.DomEvent.on(btn, 'click', () => onClick(btn));
      return btn;
    }
  });
}

// ─── SVG OVERLAY ──────────────────────────────────────────────────────────────
function buildZoneOverlay(locations) {
  const ns = 'http://www.w3.org/2000/svg';
  svgEl = document.createElementNS(ns, 'svg');
  svgEl.setAttribute('xmlns', ns);
  svgEl.setAttribute('viewBox', `0 ${SVG_Y_OFFSET} ${SVG_SIZE} ${SVG_SIZE}`);

  const regions = locations.filter(l => l.layer==='region');
  const singles = locations.filter(l => l.layer==='zone' && !l.extraShapes);
  const multis  = locations.filter(l => l.layer==='zone' &&  l.extraShapes);
  const extras  = locations.filter(l => l.layer==='extra');

  [...regions, ...singles, ...multis, ...extras].forEach(loc => {
    if (!loc.shape) return;
    const cls = `zone-polygon layer-${loc.layer}${loc.showAtAllZooms ? ' always-visible' : ''}`;
    addShapeEl(svgEl, loc.shape, loc.id, cls);
    (loc.extraShapes || []).forEach(s => addShapeEl(svgEl, s, loc.id, cls));
  });

  // Use custom zonesPane (z=450) so zone strokes always render above interior image overlays (overlayPane z=400)
  // pane pointer-events are 'none' but the SVG element itself is interactive
  const svgOverlayLayer = L.svgOverlay(svgEl, [px(0,0), px(SVG_SIZE,SVG_SIZE)], { interactive: true, pane: 'zonesPane' }).addTo(map);
  // Re-enable pointer events on the SVG element directly (pane is none, SVG overrides)
  svgEl.style.pointerEvents = 'auto';
  svgEl.addEventListener('mouseover', onZoneMouseover);
  svgEl.addEventListener('mouseout',  onZoneMouseout);
  svgEl.addEventListener('click',     onZoneClick);
  updateZoomClasses();
}

function addShapeEl(svg, shape, id, cls) {
  const ns = 'http://www.w3.org/2000/svg';
  let el;
  if      (shape.type==='polygon') { el = document.createElementNS(ns,'polygon'); el.setAttribute('points', shape.data); }
  else if (shape.type==='path')    { el = document.createElementNS(ns,'path');    el.setAttribute('d', shape.data); }
  else if (shape.type==='circle')  { el = document.createElementNS(ns,'circle');  el.setAttribute('cx', shape.cx); el.setAttribute('cy', shape.cy); el.setAttribute('r', shape.r); }
  if (el) { el.setAttribute('class', cls); el.dataset.id = id; svg.appendChild(el); }
}

function updateZoomClasses() {
  if (!svgEl) return;
  svgEl.classList.toggle('zoom-far', map.getZoom() <= 2);
}
map.on('zoomend', updateZoomClasses);

// ─── ZONE INTERACTIONS ────────────────────────────────────────────────────────
const zoneNameEl = document.getElementById('zone-name');
const MAP_BOUNDS_VALID = { min: 50, max: 11450 };

function cleanName(loc) { return (loc.name || loc.id).replace(/^[—\-\s]+|[—\-\s]+$/g, ''); }
function allShapes(id)   { return svgEl ? svgEl.querySelectorAll(`[data-id="${id}"]`) : []; }

function safeCenter(loc) {
  if (!loc.center) return null;
  const [cx, cy] = loc.center;
  return (cx > MAP_BOUNDS_VALID.min && cx < MAP_BOUNDS_VALID.max &&
          cy > MAP_BOUNDS_VALID.min && cy < MAP_BOUNDS_VALID.max)
    ? [cx, cy] : null;
}

function onZoneMouseover(e) {
  const el = e.target.closest('[data-id]'); if (!el) return;
  const loc = locationMap[el.dataset.id]; if (!loc) return;
  allShapes(el.dataset.id).forEach(s => s.classList.add('hover'));
  zoneNameEl.textContent = cleanName(loc);
  zoneNameEl.classList.add('visible');
}
function onZoneMouseout(e) {
  const el = e.target.closest('[data-id]'); if (!el) return;
  allShapes(el.dataset.id).forEach(s => s.classList.remove('hover'));
  zoneNameEl.classList.remove('visible');
}
function onZoneClick(e) {
  const el = e.target.closest('[data-id]'); if (!el) return;
  const id = el.dataset.id, loc = locationMap[id]; if (!loc) return;
  if (activeId && activeId !== id) deactivateZone(activeId);
  activeId = id;
  allShapes(id).forEach(s => s.classList.add('active'));
  zoneNameEl.classList.remove('visible');
  openPanel(loc);
}
function deactivateZone(id) {
  allShapes(id).forEach(s => { s.classList.remove('active'); s.classList.remove('hover'); });
  clearInterior();
}

// ─── PANEL ────────────────────────────────────────────────────────────────────
const panel     = document.getElementById('info-panel');
const panelName = document.getElementById('panel-name');
const panelLog  = document.getElementById('panel-logline');
const panelDesc = document.getElementById('panel-description');

function openPanel(loc) {
  const populate = () => {
    panelName.textContent = cleanName(loc);
    panelLog.textContent  = loc.logLine || '';
    panelDesc.innerHTML   = loc.description || '';
    document.getElementById('panel-body').scrollTop = 0;

    const iconsEl = document.getElementById('panel-icons');
    iconsEl.innerHTML = '';
    if (loc.interiors && loc.interiors.length > 0) {
      const eBtn = makeViewBtn('exterior', 'Exterior', ICONS.exterior);
      eBtn.classList.add('active');
      eBtn.addEventListener('click', () => showExterior(eBtn));
      iconsEl.appendChild(eBtn);
      const iBtn = makeViewBtn('interior', 'Interior', ICONS.interior);
      iBtn.addEventListener('click', () => swapInterior(loc.interiors[0], iBtn, loc));
      iconsEl.appendChild(iBtn);
      if (loc.interiors.length >= 2) {
        const uBtn = makeViewBtn('upstairs', 'Upper Floor', ICONS.upstairs);
        uBtn.addEventListener('click', () => swapInterior(loc.interiors[1], uBtn, loc));
        iconsEl.appendChild(uBtn);
      }
    }
    buildPortraitCarousel(loc.characters || []);
  };

  // Always: disable transitions, fade out, reset off-screen, populate, then slide in.
  // Doing this the same way every time avoids inconsistent browser batching.
  panel.style.transition = 'none';
  panel.style.opacity    = '0';
  panel.classList.remove('open');

  // Let the browser commit the invisible off-screen state, then slide in with content
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      populate();
      panel.style.transition = '';   // restore CSS transition
      panel.style.opacity    = '1';
      panel.classList.add('open');
    });
  });
}

function makeViewBtn(key, tip, icon) {
  const btn = document.createElement('button');
  btn.className = 'view-btn'; btn.dataset.view = key;
  btn.innerHTML = `${icon}<span class="btn-tip">${tip}</span>`;
  return btn;
}

function showExterior(btn) {
  clearInterior();
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function clearInterior() {
  if (!interiorLayer) return;
  const dying = interiorLayer; interiorLayer = null; activeInterior = null;
  dying.setOpacity(0);
  setTimeout(() => { try { map.removeLayer(dying); } catch(e) {} }, 400);
}

function closePanel() {
  panel.style.transition = '';
  panel.style.opacity    = '1';
  panel.classList.remove('open');
  if (activeId) { deactivateZone(activeId); activeId = null; }
}

document.getElementById('panel-fold').addEventListener('click', closePanel);

document.getElementById('panel-open-tab').addEventListener('click', () => {
  if (activeId) {
    panel.classList.add('open');
  } else {
    panelName.textContent = 'Explore the Map';
    panelLog.textContent = '';
    panelDesc.innerHTML = 'Click on buildings and landmarks as you pan around to learn more about them, reveal their NPC cast, and toggle their interiors.';
    document.getElementById('panel-icons').innerHTML = '';
    buildPortraitCarousel([]);
    panel.classList.add('open');
    setTimeout(() => panel.classList.remove('open'), 6000);
  }
});

// ─── PORTRAIT CAROUSEL ────────────────────────────────────────────────────────
// portraitPage = index of the first visible portrait (wraps with modulo)
function buildPortraitCarousel(characters) {
  portraitData = characters;
  portraitPage = 0;
  const wrap = document.getElementById('panel-portraits-wrap');

  if (!characters || characters.length === 0) {
    wrap.classList.remove('has-portraits');
    return;
  }
  wrap.classList.add('has-portraits');
  renderPortraits();
}

function renderPortraits() {
  const track   = document.getElementById('portrait-track');
  const nextBtn = document.getElementById('portrait-next');
  const total   = portraitData.length;
  const tooltip = document.getElementById('portrait-tooltip');

  const count = Math.min(total, PORTRAITS_PER_PAGE);
  track.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const name = portraitData[(portraitPage + i) % total];
    const div  = document.createElement('div'); div.className = 'portrait-wrap';
    const img  = document.createElement('img'); img.src = CHAR_URL(name); img.alt = name; img.loading = 'lazy';
    div.appendChild(img);

    // Shared fixed tooltip — position above the portrait on hover
    div.addEventListener('mouseenter', () => {
      const r = div.getBoundingClientRect();
      tooltip.textContent = name;
      // Position above portrait, centered
      tooltip.style.left = (r.left + r.width / 2) + 'px';
      tooltip.style.top  = (r.top - 8) + 'px';
      tooltip.style.transform = 'translateX(-50%) translateY(-100%)';
      tooltip.classList.add('visible');
    });
    div.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

    track.appendChild(div);
  }

  nextBtn.classList.toggle('hidden', total <= PORTRAITS_PER_PAGE);
  track.style.transform = 'translateX(0)';
}

document.getElementById('portrait-next').addEventListener('click', () => {
  const total = portraitData.length;
  if (total <= PORTRAITS_PER_PAGE) return;
  // Advance one portrait at a time, wrap
  portraitPage = (portraitPage + 1) % total;
  renderPortraits();
});

// ─── INTERIOR SWAP ────────────────────────────────────────────────────────────
function swapInterior(intId, btn, loc) {
  if (activeInterior === intId) {
    showExterior(document.querySelector('.view-btn[data-view="exterior"]'));
    return;
  }
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const bmap = loc.interiorBoundsMap || {};
  const bb   = bmap[intId];

  const overlayBounds = bb
    ? [px(bb[0][0], bb[0][1]), px(bb[1][0], bb[1][1])]
    : (() => { const [[mx,my],[Mx,My]] = loc.bounds; return [px(mx,my), px(Mx,My)]; })();

  const [icx, icy] = bb
    ? [(bb[0][0]+bb[1][0])/2, (bb[0][1]+bb[1][1])/2]
    : (safeCenter(loc) || loc.center || [6200, 7000]);

  const newLayer = L.imageOverlay(INT_URL(intId), overlayBounds, { opacity: 0, zIndex: 300 }).addTo(map);
  const doSwap = () => {
    setTimeout(() => { if (newLayer) newLayer.setOpacity(1); }, 20);
    if (interiorLayer) {
      const old = interiorLayer;
      setTimeout(() => { try { old.setOpacity(0); } catch(e) {} }, 20);
      setTimeout(() => { try { map.removeLayer(old); } catch(e) {} }, 420);
    }
    interiorLayer = newLayer;
    activeInterior = intId;
  };
  const img = new Image();
  img.onload = doSwap;
  img.onerror = () => {
    console.warn(`Interior image not found on R2: ${INT_URL(intId)}`);
    try { map.removeLayer(newLayer); } catch(e) {}
    // Restore exterior button state
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    const eBtn = document.querySelector('.view-btn[data-view="exterior"]');
    if (eBtn) eBtn.classList.add('active');
  };
  img.src = INT_URL(intId);

  // Shift the map center LEFT so the zone appears in the center of the visible area
  // (the right 70% of screen, with panel occupying left 30%).
  //
  // In CRS.Simple: map.project pixel space == CSS pixels (1:1 at any zoom).
  // zone_screen_x = viewport/2 - shift  (positive shift moves zone left)
  // We want zone_screen_x = panel + (viewport - panel)/2  (center of visible area)
  // So: shift = viewport/2 - (panel + (viewport-panel)/2) = -panelCss/2  (negative)
  // Using pt.add([-shiftCss, 0]) achieves this.
  const targetZoom    = 5;
  const naturalLatLng = px(icx, icy);
  const panelCss      = Math.min(window.innerWidth * 0.30, 500);
  const shiftCss      = panelCss / 2;

  const pt           = map.project(naturalLatLng, targetZoom);
  const offsetLatLng = map.unproject(pt.add([-shiftCss, 0]), targetZoom);

  map.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 0.9 });
}

// ─── GRID ─────────────────────────────────────────────────────────────────────
function toggleGrid(btn) {
  gridVisible = !gridVisible; btn.classList.toggle('active', gridVisible);
  if (gridVisible) {
    const ns = 'http://www.w3.org/2000/svg';
    const gs = document.createElementNS(ns, 'svg');
    gs.setAttribute('viewBox', `0 ${SVG_Y_OFFSET} ${SVG_SIZE} ${SVG_SIZE}`);
    const defs = document.createElementNS(ns, 'defs');
    const pat  = document.createElementNS(ns, 'pattern');
    pat.setAttribute('id','gp'); pat.setAttribute('width', GRID_SPACING_SVG); pat.setAttribute('height', GRID_SPACING_SVG);
    pat.setAttribute('patternUnits','userSpaceOnUse');
    const gp = document.createElementNS(ns,'path');
    gp.setAttribute('d', `M ${GRID_SPACING_SVG} 0 L 0 0 0 ${GRID_SPACING_SVG}`);
    gp.setAttribute('fill','none'); gp.setAttribute('stroke', GRID_COLOR); gp.setAttribute('stroke-width', GRID_WIDTH_SVG);
    pat.appendChild(gp); defs.appendChild(pat); gs.appendChild(defs);
    const rect = document.createElementNS(ns,'rect');
    rect.setAttribute('x', 0); rect.setAttribute('y', SVG_Y_OFFSET);
    rect.setAttribute('width', SVG_SIZE); rect.setAttribute('height', SVG_SIZE);
    rect.setAttribute('fill','url(#gp)'); gs.appendChild(rect);
    gridLayer = L.svgOverlay(gs, [px(0,0), px(SVG_SIZE,SVG_SIZE)], { interactive: false, pane: 'zonesPane', zIndex: 460 }).addTo(map);
  } else {
    if (gridLayer) { map.removeLayer(gridLayer); gridLayer = null; }
  }
}

// ─── RADIAL REVEAL — retained for intro integration ───────────────────────────
// Called by intro file once its animation completes.
// revealOrigin: { x: 0–100 (% of viewport), y: 0–100 }
function radialReveal(revealOrigin, onComplete) {
  const cpx = revealOrigin ? revealOrigin.x.toFixed(1) : '50.0';
  const cpy = revealOrigin ? revealOrigin.y.toFixed(1) : '50.0';
  function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
  const dur = 2800, t0 = performance.now();
  function animReveal(now) {
    const t = Math.min((now - t0) / dur, 1);
    const r = easeInOut(t) * 200;
    const mask = `radial-gradient(circle at ${cpx}% ${cpy}%, transparent ${Math.max(0,r-2)}%, rgba(0,0,0,1) ${r}%)`;
    document.body.style.webkitMaskImage = mask;
    document.body.style.maskImage = mask;
    if (t < 1) { requestAnimationFrame(animReveal); }
    else {
      document.body.style.webkitMaskImage = '';
      document.body.style.maskImage = '';
      if (onComplete) onComplete();
    }
  }
  requestAnimationFrame(animReveal);
}

// ─── INTRO ────────────────────────────────────────────────────────────────────
(function initIntro() {
  const landing = document.getElementById('landing');
  if (!landing) return;

  const R2_ANIMATED = 'https://pub-c58d34cf00c64454a7a4841d1570b1c0.r2.dev/animated';
  const scene    = document.getElementById('landing-scene');
  const viewport = document.getElementById('landing-viewport');

  // ── Sprite sizing ──────────────────────────────────────────────────────────
  const sprites = [
    { id: 'upperImg',      src: 'person.webp',    scale: 0.8 },
    { id: 'keepImg',       src: 'person.webp',    scale: 0.8 },
    { id: 'gateImg',       src: 'person.webp',    scale: 0.8 },
    { id: 'harborImg',     src: 'person.webp',    scale: 0.8 },
    { id: 'watchImg',      src: 'person.webp',    scale: 0.8 },
    { id: 'skirtsImg1',    src: 'person.webp',    scale: 0.8 },
    { id: 'skirtsImg2',    src: 'person.webp',    scale: 0.8 },
    { id: 'apothecaryImg', src: 'person.webp',    scale: 0.8 },
    { id: 'plateauImg',    src: 'person.webp',    scale: 0.8 },
    { id: 'orchardImg',    src: 'person.webp',    scale: 0.8 },
    { id: 'treeImg',       src: 'person.webp',    scale: 0.8 },
    { id: 'graveImg',      src: 'person.webp',    scale: 0.8 },
    { id: 'fishImg',       src: 'person.webp',    scale: 0.8 },
    { id: 'boatImg',       src: 'boat.webp',      scale: 1.0 },
    { id: 'mineImg',       src: 'handCart.webp',  scale: 1.0 },
    { id: 'deliveryImg',   src: 'handCart.webp',  scale: 1.0 },
    { id: 'woodsImg',      src: 'handCart.webp',  scale: 1.0 },
    { id: 'basilicaImg',   src: 'horseCart.webp', scale: 1.0 },
    { id: 'dairyImg',      src: 'oxCart.webp',    scale: 1.0 },
  ];
  const sizeCache = {};
  sprites.forEach(({ id, src, scale }) => {
    const el = document.getElementById(id); if (!el) return;
    const apply = (nw, nh) => {
      const w = nw * scale, h = nh * scale;
      el.setAttribute('width', w); el.setAttribute('height', h);
      el.setAttribute('x', -w / 2); el.setAttribute('y', -h / 2);
    };
    const fullSrc = `${R2_ANIMATED}/${src}`;
    if (sizeCache[src]) { apply(...sizeCache[src]); return; }
    const img = new Image(); img.src = fullSrc;
    img.onload = () => { sizeCache[src] = [img.naturalWidth, img.naturalHeight]; apply(img.naturalWidth, img.naturalHeight); };
  });

  // ── Pan loop ───────────────────────────────────────────────────────────────
  const CYCLE_DURATION = 260;
  let panTravel = 0, panStartTime = null, panRafId = null;

  function setupPan() {
    if (!landing.parentNode) return;
    panTravel = scene.getBoundingClientRect().height - viewport.getBoundingClientRect().height;
    if (panTravel <= 0) { panRafId = requestAnimationFrame(setupPan); return; }
    if (!panStartTime) panRafId = requestAnimationFrame(panLoop);
  }
  const fadeEl = document.getElementById('landing-fade-cover');
  let fadedIn = false;
  function panLoop(ts) {
    if (!landing.parentNode) return;
    if (!panStartTime) panStartTime = ts;
    const elapsed = (ts - panStartTime) / 1000 + 20;
    const t = (elapsed % CYCLE_DURATION) / CYCLE_DURATION;
    const offset = (1 - Math.cos(2 * Math.PI * t)) / 2;
    scene.style.transform = `translateY(${-panTravel * (1 - offset)}px)`;
    if (!fadedIn && fadeEl) {
      fadedIn = true;
      // Scene is now positioned — trigger the fade on the next paint
      requestAnimationFrame(() => {
        fadeEl.style.opacity = '0';
        fadeEl.addEventListener('transitionend', () => { fadeEl.style.pointerEvents = 'none'; }, { once: true });
      });
    }
    panRafId = requestAnimationFrame(panLoop);
  }
  setTimeout(setupPan, 200);
  window.addEventListener('resize', setupPan);

  // ── Entry ──────────────────────────────────────────────────────────────────
  let entered = false;

  function enterMap(originX, originY) {
    if (entered) return;
    entered = true;

    // Cancel pan loop and resize listener
    if (panRafId) cancelAnimationFrame(panRafId);
    window.removeEventListener('resize', setupPan);

    // Make sure map is at default start position
    map.setView(px(6200, 7000), 3, { animate: false });

    // Radial reveal: wipe the landing div specifically, not body
    const cpx = originX.toFixed(1), cpy = originY.toFixed(1);
    function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
    const dur = 2800, t0 = performance.now();
    function animReveal(now) {
      const t = Math.min((now - t0) / dur, 1);
      const r = easeInOut(t) * 200;
      const mask = `radial-gradient(circle at ${cpx}% ${cpy}%, transparent ${Math.max(0,r-2)}%, rgba(0,0,0,1) ${r}%)`;
      landing.style.webkitMaskImage = mask;
      landing.style.maskImage = mask;
      if (t < 1) { requestAnimationFrame(animReveal); }
      else {
        landing.remove(); // fully removed — all intro computation stops
        // Show the hint panel 1s after entering, auto-hide after 6s
        setTimeout(() => {
          if (activeId) return; // skip if user already clicked a zone
          panelName.textContent = 'Explore the Map';
          panelLog.textContent  = '';
          panelDesc.innerHTML   = 'Click on buildings and landmarks as you pan around to learn more about them, see their NPC cast, and toggle their interiors.';
          document.getElementById('panel-icons').innerHTML = '';
          buildPortraitCarousel([]);
          panel.style.transition = '';
          panel.style.opacity    = '1';
          panel.classList.add('open');
          setTimeout(() => {
            if (!activeId) closePanel();
          }, 6000);
        }, 1000);
      }
    }
    requestAnimationFrame(animReveal);
  }

  // Click anywhere on landing
  landing.addEventListener('click', e => {
    const x = (e.clientX / window.innerWidth  * 100);
    const y = (e.clientY / window.innerHeight * 100);
    enterMap(x, y);
  });

  // Keyboard: Enter or Space
  document.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && !entered) {
      e.preventDefault();
      enterMap(50, 50); // radial from screen center
    }
  });
})();

fetch('locations.json')
  .then(r => r.json())
  .then(data => {
    LOCATIONS   = data;
    locationMap = Object.fromEntries(data.map(l => [l.id, l]));
    buildZoneOverlay(LOCATIONS);
  })
  .catch(err => console.warn('locations.json not loaded (needs local server):', err));
</script>
